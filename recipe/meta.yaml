{% set name = "ipywidgets" %}
{% set version = "8.1.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 15f1ac050b9ccbefd45dccfbb2ef6bed0029d8278682d569d71b8dd96bee0376

build:
  number: 0
  skip: true  # [py<37 or s390x]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools >=40.8.0
    - wheel
  run:
    - python
    - comm >=0.1.3
    - ipython >=6.1.0
    - traitlets >=4.3.1
    - widgetsnbextension >=4.0.14,<4.1.dev0
    - jupyterlab_widgets >=3.0.15,<3.1.dev0

test:
  imports:
    - ipywidgets
  requires:
    - jsonschema
    - ipykernel
    - pip
    - pytest
    - pytz
  commands:
    - pip check
    - pytest -vv --pyargs ipywidgets

about:
  home: https://jupyter.org
  license: BSD-3-Clause
  license_file: LICENSE
  license_family: BSD
  summary: Interactive Widgets for the Jupyter Notebook
  description: |
    ipywidgets are interactive HTML widgets for Jupyter notebooks and the IPython kernel.
  doc_url: https://ipywidgets.readthedocs.io
  dev_url: https://github.com/jupyter-widgets/ipywidgets

extra:
  recipe-maintainers:
    - jakirkham
    - minrk
    - pelson
    - SylvainCorlay
    - willingc
    - jasongrout
    - maartenbreddels
    - pbugnion
    - jtpio
